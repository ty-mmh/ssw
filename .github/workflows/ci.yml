name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-and-synth:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install app dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --runInBand

      - name: Install CDK dependencies
        run: npm ci --prefix infra/cdk

      - name: CDK synth
        run: npm run synth --prefix infra/cdk
