<!DOCTYPE html>
<html lang="ja" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>セキュアチャット - FRIENDLYモード</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            background-color: #0c0a09; /* a dark fallback */
        }
        .glass-pane {
            background-color: rgba(31, 41, 55, 0.5); /* bg-gray-800 with opacity */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-width: 1px;
            border-color: rgba(75, 85, 99, 0.5); /* border-gray-600 with opacity */
        }
        /* スクロールバーのスタイル */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
    </style>
</head>
<body class="bg-stone-950">
    <div id="root"></div>

    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'primary': '#3b82f6', // blue-500
              'secondary': '#8b5cf6', // purple-500
              'accent': '#10b981', // emerald-500
              'danger': '#ef4444', // red-500
              'warning': '#f59e0b', // amber-500
            },
            animation: {
                'fade-in': 'fadeIn 0.5s ease-out forwards',
                'subtle-pulse': 'subtlePulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
                fadeIn: {
                    '0%': { opacity: 0, transform: 'translateY(10px)' },
                    '100%': { opacity: 1, transform: 'translateY(0)' },
                },
                subtlePulse: {
                    '0%, 100%': { opacity: 1 },
                    '50%': { opacity: .7 },
                }
            }
          }
        }
      }
    </script>

    <script src="/js/modules/icons.js"></script>
    <script src="/js/modules/utils.js"></script>
    <script src="/js/modules/crypto.js"></script>
    <script src="/js/modules/sessionManager.js"></script>
    <script src="/js/modules/KeyExchangeManager.js"></script>
    <script src="/js/modules/api.js"></script>
    
    <script src="/js/components/enhanced/EncryptionStatus.js"></script>
    <script src="/js/components/enhanced/EnhancedMessageDisplay.js"></script>
    <script src="/js/components/Login.js"></script>
    <script src="/js/components/enhanced/IntegratedChatUI.js"></script>
    
    <script src="/js/app.js"></script>
</body>
</html>
